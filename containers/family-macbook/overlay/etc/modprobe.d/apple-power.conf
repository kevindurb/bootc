# Disable NVMe Autonomous Power State Transitions — Apple's SSD hangs
# when the NVMe controller attempts deep power state transitions (APST).
options nvme_core default_ps_max_latency_us=0

# Enable Intel framebuffer compression to reduce memory bandwidth on battery.
# PSR (panel self-refresh) is intentionally left off — it causes screen
# corruption on the MBP14,1 display.
options i915 enable_fbc=1
