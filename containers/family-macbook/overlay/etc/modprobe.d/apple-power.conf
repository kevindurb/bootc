# Disable NVMe Autonomous Power State Transitions — Apple's SSD hangs
# when the NVMe controller attempts deep power state transitions (APST).
options nvme_core default_ps_max_latency_us=0

# Disable Intel display compression/PSR — both cause display corruption or
# wake instability on the MBP14,1 panel. PSR (panel self-refresh) corrupts
# the screen; FBC interferes with reliable s2idle resume.
options i915 enable_fbc=0 enable_psr=0
