---
name: Build
on:
  schedule:
    - cron: '05 10 * * 0' # 10:05am UTC Sunday
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:
  workflow_call:

env:
  IMAGE_REGISTRY: 'ghcr.io/${{ github.repository_owner }}' # do not edit

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  dev-scripts:
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      image: dev-scripts

  kinoite:
    needs: [dev-scripts]
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      image: kinoite

  macbook:
    needs: [kinoite]
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      image: macbook

  steamdeck:
    needs: [dev-scripts]
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      image: steamdeck

  tablet:
    needs: [kinoite]
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      image: tablet

  workstation:
    needs: [kinoite]
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      image: workstation
