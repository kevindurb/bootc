---
name: Build
on:
  schedule:
    - cron: '05 10 * * 0' # 10:05am UTC Sunday
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:
  workflow_call:

env:
  IMAGE_REGISTRY: 'ghcr.io/${{ github.repository_owner }}' # do not edit

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dev-scripts: ${{ steps.filter.outputs.dev-scripts }}
      kinoite: ${{ steps.filter.outputs.kinoite }}
      macbook: ${{ steps.filter.outputs.macbook }}
      family-macbook: ${{ steps.filter.outputs.family-macbook }}
      steamdeck: ${{ steps.filter.outputs.steamdeck }}
      tablet: ${{ steps.filter.outputs.tablet }}
      workstation: ${{ steps.filter.outputs.workstation }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            dev-scripts:
              - 'containers/dev-scripts/**'
            kinoite:
              - 'containers/dev-scripts/**'
              - 'containers/kinoite/**'
            macbook:
              - 'containers/dev-scripts/**'
              - 'containers/kinoite/**'
              - 'containers/macbook/**'
            family-macbook:
              - 'containers/dev-scripts/**'
              - 'containers/kinoite/**'
              - 'containers/family-macbook/**'
            steamdeck:
              - 'containers/dev-scripts/**'
              - 'containers/steamdeck/**'
            tablet:
              - 'containers/dev-scripts/**'
              - 'containers/kinoite/**'
              - 'containers/tablet/**'
            workstation:
              - 'containers/dev-scripts/**'
              - 'containers/kinoite/**'
              - 'containers/workstation/**'

  dev-scripts:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.dev-scripts == 'true' || github.event_name != 'push'
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      skip-maximize-build-space: true
      image: dev-scripts

  kinoite:
    needs: [detect-changes, dev-scripts]
    if: needs.detect-changes.outputs.kinoite == 'true' || github.event_name != 'push'
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      skip-maximize-build-space: true
      image: kinoite

  macbook:
    needs: [detect-changes, kinoite]
    if: needs.detect-changes.outputs.macbook == 'true' || github.event_name != 'push'
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      skip-maximize-build-space: true
      image: macbook

  family-macbook:
    needs: [detect-changes, kinoite]
    if: needs.detect-changes.outputs.family-macbook == 'true' || github.event_name != 'push'
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      skip-maximize-build-space: true
      image: family-macbook

  steamdeck:
    needs: [detect-changes, dev-scripts]
    if: needs.detect-changes.outputs.steamdeck == 'true' || github.event_name != 'push'
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      image: steamdeck

  tablet:
    needs: [detect-changes, kinoite]
    if: needs.detect-changes.outputs.tablet == 'true' || github.event_name != 'push'
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      skip-maximize-build-space: true
      image: tablet

  workstation:
    needs: [detect-changes, kinoite]
    if: needs.detect-changes.outputs.workstation == 'true' || github.event_name != 'push'
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      skip-maximize-build-space: true
      image: workstation
